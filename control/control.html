<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control</title>
</head>
<style>
    *{
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        font-size: 1rem;
        color: white;
        text-align: center;
    }
    .control-panel{
        display: grid;
        grid-template-rows: repeat(3, 1fr);  
        grid-template-columns: repeat(3, 1fr);
        height: 100vh;
        width: 100%; 
        gap: 5px;
    }
    .up {
        grid-column: 1 / 4;
        grid-row: 1 / 2;
        background-color: rgba(128, 128, 128);
    }
    .up:active{
        opacity: 0.5;
    }
    .down {
        grid-column: 1 / 4;
        grid-row: 3 / 4;
        background-color: rgba(128, 128, 128);
    }
    .down:active{
        opacity: 0.5;
    }
    .left {
        grid-column: 1 / 2;
        grid-row: 2 / 3; 
        background-color: rgb(128, 128, 128);
    }
    .left:active{
        opacity: 0.5;
    }
    .right {
        grid-column: 3 / 4;
        grid-row: 2 / 3;
        background-color: rgba(128, 128, 128);
    }
    .right:active{
        opacity: 0.5;
    }
    .center{
        grid-column: 2 / 3;
        grid-row: 2 / 3;
        background-color: rgb(255, 128, 128);
        display: grid;
        grid-template-rows: repeat(2, 1fr);
        gap: 5px;
    }
    .clickleft{
        background-color: rgb(128, 128, 255);
        margin: 5px;
    }
    .clickleft:active{
        opacity: 0.5;
    }
    .releaseleft{
        background-color: rgb(128, 128, 255);
        margin: 5px;
    }
    .releaseleft:active{
        opacity: 0.5;
    }
</style>
<body>
    <div class="control-panel">
        <div class="up">up</div>
        <div class="left">left</div>
        <div class="center">
            <div class="clickleft">clickleft</div>
            <div class="releaseleft">releaseleft</div>
        </div>
        <div class="right">right</div>
        <div class="down">down</div>
    </div>
</body>
<script src="./control.js"></script>
</html>
